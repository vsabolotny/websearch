name: Salon-room monitor

on:
  schedule:
    - cron: "*/20 * * * *" # every 20 minutes (GitHub may delay during peak load)
  workflow_dispatch: # allow manual runs from the Actions tab
    inputs:
      mode:
        description: "Report mode"
        type: choice
        default: new
        options: [new, full] # new = only new listings; full = the whole current list

# Needed so the job can commit the updated dedup state back to the repo.
permissions:
  contents: write

# Never let two runs overlap.
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run monitor
        env:
          MODE: ${{ github.event.inputs.mode || 'new' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAILS: ${{ secrets.REPORT_EMAILS }}
        run: npm start

      - name: Persist dedup state
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update seen listings [skip ci]"
            git push
          else
            echo "No state changes."
          fi
